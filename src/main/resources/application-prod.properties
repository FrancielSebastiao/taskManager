server.port=${PORT:8080}
app.base-url=${APP_BASE_URL}

################### MySQL Connection ##########################
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

################### JavaMail Configuration ##########################
spring.mail.username=${MAIL_USERNAME}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}

################### JWT Configuration ##########################
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token.expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
app.jwt.refresh-token.expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.jwt.cookie.secure=true

################### LOG Configuration ##########################
logging.level.com.fransebastiao.taskmanager=INFO
logging.level.org.springframework.security=WARN

# AWS S3
app.aws.access-key=${AWS_ACCESS_KEY}
app.aws.secret-key=${AWS_SECRET_KEY}
app.aws.region=${AWS_REGION:eu-north-1}
app.aws.bucket=${AWS_BUCKET}

################### FRONTEND Configuration ##########################
frontend.url=${FRONTEND_URL}