spring.application.name=taskmanager

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR

################### MySQL Configuration ##########################
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate

spring.main.allow-bean-definition-overriding=true 
spring.main.allow-circular-references=true

################### JavaMail Configuration ##########################
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}

################### Cookie Configuration ##########################
app.jwt.refresh-cookie-name=refresh_token
app.jwt.cookie.path=/

################### Ficheiros permitidos ##########################
app.upload.allowed-types=image/jpeg,image/png

################### FLYWAY Configuration ##########################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true